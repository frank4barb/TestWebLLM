<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>AI Browser Assistant – WebLLM</title>

<style>
    body { margin:0; padding:0; font-family:Arial; }

    #topFrame {
        height: 120px;
        border-bottom: 2px solid #666;
        padding: 10px;
        box-sizing: border-box;
    }

    #bottom {
        display:flex;
        height: calc(100vh - 120px);
        width:100%;
    }

    #leftFrame {
        width:50%;
        height:100%;
        border-right:2px solid #666;
    }

    #rightFrame {
        width:50%;
        height:100%;
        padding:10px;
        box-sizing: border-box;
        overflow:auto;
    }

    iframe {
        width:100%;
        height:100%;
        border:0;
    }

    textarea, input[type=text] {
        width:100%;
        padding:8px;
        margin-bottom:10px;
        box-sizing:border-box;
        font-size:14px;
    }

    #chatBox {
        height:60%;
        background:#f2f2f2;
        border:1px solid #ccc;
        padding:10px;
        overflow:auto;
    }
</style>
</head>

<body>

<!-- FRAME SUPERIORE -->
<div id="topFrame">
    <label>URL della pagina da caricare:</label>
    <input type="text" id="urlInput" placeholder="https://example.com">
    <button onclick="loadPage()">Carica Pagina</button>
    <div style="font-size:12px;color:#555;">
        (Nota: alcuni siti non possono essere caricati in iframe)
    </div>
</div>

<!-- 2 FRAME SOTTO -->
<div id="bottom">

    <!-- FRAME SINISTRO -->
    <div id="leftFrame">
        <iframe id="webFrame"></iframe>
    </div>

    <!-- FRAME DESTRO: CHAT -->
    <div id="rightFrame">
        <div id="chatBox">[La conversazione apparirà qui]</div>
        <textarea id="askBox" placeholder="Scrivi la tua domanda..."></textarea>
        <button onclick="sendQuestion()">Invia</button>
    </div>
</div>


<!-- ✅ WEBLLM + MLC (modello funzionante) -->
<script type="module">
import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

// ✅ modello reale, disponibile e testato
const modelName = "mlc-ai/TinyLlama-1.1B-Chat-v0.4-q4f16_1-MLC";

let engine = null;
let pageTextContent = "";
let systemPrompt = "";

// ✅ carica LLM alla partenza
async function initLLM() {
    engine = await CreateMLCEngine(modelName, {
        initProgressCallback : (p) => console.log("Loading model:", p)
    });
    resetConversation();
}
initLLM();


// ✅ reset tra una pagina e l'altra
function resetConversation() {
    systemPrompt = 
`Sei un assistente AI che deve rispondere **solo** sulla base del contenuto testuale della pagina caricata.
Ignora ogni altra conoscenza.
Se l’utente chiede di analizzare immagini, rispondi: "Non posso analizzare immagini".

Contenuto della pagina:

${pageTextContent}
`;
    document.getElementById("chatBox").innerHTML =
        "[Pronto. Carica una pagina e fai una domanda.]";
}


// ✅ Caricamento della pagina nel frame sinistro
async function loadPage() {
    const url = document.getElementById("urlInput").value.trim();
    if (!url) return;

    // Caricamento nell'iframe
    document.getElementById("webFrame").src = url;

    // Estrazione testo (se CORS consente)
    try {
        const res = await fetch(url);
        const html = await res.text();

        const tmp = document.createElement("div");
        tmp.innerHTML = html;

        pageTextContent = tmp.innerText
            .replace(/\s+/g, " ")
            .trim()
            .slice(0, 20000); // evita prompt troppo grande

    } catch (e) {
        pageTextContent = "Impossibile accedere al testo della pagina (CORS).";
    }

    resetConversation();
}


// ✅ invio domanda all’AI
async function sendQuestion() {
    const question = document.getElementById("askBox").value.trim();
    if (!question) return;

    appendToChat("TU", question);
    document.getElementById("askBox").value = "";

    const reply = await engine.chat.completions.create({
        messages: [
            { role:"system", content: systemPrompt },
            { role:"user",   content: question }
        ]
    });

    appendToChat("AI", reply.choices[0].message.content);
}


// ✅ append al box chat
function appendToChat(sender, text) {
    const box = document.getElementById("chatBox");
    box.innerHTML += `<p><b>${sender}:</b> ${text}</p>`;
    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
